name: "email-security-system"
version: "1.0.0"
description: "AI-powered email security classification environment"

environment:
  type: "classification"
  action_space:
    type: "text"
    min_length: 1
    max_length: 10000

  observation_space:
    type: "dict"
    fields:
      intent:
        type: "categorical"
        values: ["safe", "spam", "phishing", "suspicious"]
      confidence:
        type: "float"
        min: 0.0
        max: 1.0
      risk_level:
        type: "categorical"
        values: ["low", "high"]
      explanation:
        type: "string"
        max_length: 500

tasks:
  easy_task:
    name: "easy_task"
    description: "Detect spam or safe emails"
    difficulty: "easy"

  medium_task:
    name: "medium_task"
    description: "Detect spam with confidence"
    difficulty: "medium"

  hard_task:
    name: "hard_task"
    description: "Detect spam with risk and explanation"
    difficulty: "hard"

reward:
  type: "weighted"
  range: [0.1, 0.9]   # ✅ FIXED

episode:
  max_steps: 10

api:
  base_url: "http://localhost:7860"   # ✅ FIXED
  endpoints:
    reset: "/reset"
    step: "/classify"
    state: "/state"
    set_task: "/set_task"
    health: "/health"

validation:
  deterministic: true
  reproducible: true